name: CI

on:
    push:
    pull_request:

env:
    APP_ENV: production

jobs:
    test:
        runs-on: ubuntu-latest
        # strategy:
        #     matrix:
        #         python-version: ['3.12', '3.13', '3.14']
        # env:
        #     LOG_LEVEL: debug

        steps:
            - name: Checkout
              uses: actions/checkout@v7.0.0

            # - name: Create the runner
            #   uses: ./.github/actions/setup-python-env
            #   with:
            #       python-version: ${{ matrix.python-version }}

            # - name: Generate build tag
            #   id: build
            #   run: echo "tag=build-${{ github.sha }}" >> $GITHUB_OUTPUT

            - name: install uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: 'uv.lock'

            - name: install dependencies
              run: uv sync --all-extras --dev

            - name: run ruff lint
              run: uv run ruff check .

            - name: run ruff format check
              run: uv run ruff format --check .

            - name: Run tests
              env:
                  PYTHONPATH: src
              run: uv run pytest --html=report.html

            # - name: Upload test report
            #   uses: actions/upload-artifact@v7.0.1

            #   if: always()
            #   with:
            #       name: test-report-${{ steps.build.outputs.tag }}
            #       path: report.html

    deploy-staging:
        runs-on: ubuntu-latest
        needs: test # only runs if test job passes
        environment: staging # pulls secrets/vars from staging environment

        steps:
            - uses: actions/checkout@v7.0.0

            - name: Print staging config
              run: |
                  echo "Environment: ${{ vars.APP_ENV }}"
                  echo "Database URL exists: ${{ secrets.DATABASE_URL != '' }}"
                  echo "Deployed by: ${{ github.actor }}"
                  echo "Commit: ${{ github.sha }}"
