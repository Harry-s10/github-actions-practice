name: CI

on:
    push:
    pull_request:

env:
    APP_ENV: production

jobs:
    test:
        uses: Harry-s10/central-workflow/.github/workflows/reusable-test.yml@main
        with:
            python-version: '3.14'
        secrets: inherit

    deploy-staging:
        runs-on: ubuntu-latest
        needs: test # only runs if test job passes
        environment: staging # pulls secrets/vars from staging environment

        steps:
            - uses: actions/checkout@v5

            - name: Print staging config
              run: |
                  echo "Environment: ${{ vars.APP_ENV }}"
                  echo "Database URL exists: ${{ secrets.DATABASE_URL != '' }}"
                  echo "Deployed by: ${{ github.actor }}"
                  echo "Commit: ${{ github.sha }}"
