name: CI

on:
    push:
    pull_request:

env:
    APP_ENV: production

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ['3.12', '3.13', '3.14']
        env:
            LOG_LEVEL: debug

        steps:
            - name: Create the runner
              uses: ./.github/actions/setup-python-env/action.yml
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Generate build tag
              id: build
              run: echo "tag=build-${{ github.sha }}" >> $GITHUB_OUTPUT

            - name: Run tests
              env:
                  PYTHONPATH: src
              run: uv run pytest --html=report.html

            - name: Upload test report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-report-${{ steps.build.outputs.tag }}
                  path: report.html

    deploy-staging:
        runs-on: ubuntu-latest
        needs: test # only runs if test job passes
        environment: staging # pulls secrets/vars from staging environment

        steps:
            - uses: actions/checkout@v5

            - name: Print staging config
              run: |
                  echo "Environment: ${{ vars.APP_ENV }}"
                  echo "Database URL exists: ${{ secrets.DATABASE_URL != '' }}"
                  echo "Deployed by: ${{ github.actor }}"
                  echo "Commit: ${{ github.sha }}"
