name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  APP_ENV: production # workflow-level var

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug # job-level var

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: 'uv.lock'

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate build tag
        id: build
        run: echo "tag=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Run tests
        env:
          PYTHONPATH: src # step-level var
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: uv run pytest --html=report.html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ steps.build.outputs.tag }}
          path: report.html
